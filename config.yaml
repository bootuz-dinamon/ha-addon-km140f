name: "Junctek KM140F"
description: "TCP→MQTT bridge for Junctek KM140F battery monitor"
version: "1.0.0"
slug: "junctek_km140f"
url: ""
arch:
  - aarch64
  - amd64
  - armhf
  - armv7

# Run as host network so the add-on can reach both the monitor and Mosquitto.
host_network: true

options:
  monitor_host: "192.168.1.100"  # IP address of the KM140F WiFi module
  monitor_port: 8899
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_pass: ""
  device_id: "junctek_km140f"
  device_name: "Junctek KM140F"
  poll_c_interval: 30   # how often to request :C= energy totals (seconds)
  reconnect_delay: 5

schema:
  monitor_host: str
  monitor_port: int
  mqtt_host: str
  mqtt_port: int
  mqtt_user: str
  mqtt_pass: password
  device_id: str
  device_name: str
  poll_c_interval: int
  reconnect_delay: int
