name: "Junctek KM140F"
description: "TCP→MQTT bridge for Junctek KM140F battery monitor via WiFi module"
version: "1.0.1"
slug: "km140f"
url: "https://github.com/bootuz-dinamon/ha-addon-km140f"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7

host_network: true
map: []
init: false

options:
  monitor_host: "192.168.1.100"
  monitor_port: 8899
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_pass: ""
  device_id: "junctek_km140f"
  device_name: "Junctek KM140F"
  poll_c_interval: 30
  reconnect_delay: 5

schema:
  monitor_host: str
  monitor_port: int
  mqtt_host: str
  mqtt_port: int
  mqtt_user: str
  mqtt_pass: password
  device_id: str
  device_name: str
  poll_c_interval: int
  reconnect_delay: int
